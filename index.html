<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7b3f00">
<title>Cafe a Dois - 40 Dias</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#fdf6ee;color:#3a2e1e;min-height:100vh}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px;background:linear-gradient(135deg,#7b3f00,#c47c32)}
#login-screen h1{color:white;font-size:2.2rem;margin:16px 0 8px;text-align:center}
#login-screen p{color:rgba(255,255,255,.85);text-align:center;margin-bottom:30px}
.login-icon{font-size:64px}
.login-card{background:white;border-radius:20px;padding:28px;width:100%;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.login-card h3{color:#7b3f00;margin-bottom:20px;text-align:center;font-size:1.1rem}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:.85rem;color:#7b3f00;font-weight:600;margin-bottom:6px}
.input-group input{width:100%;padding:12px 16px;border:2px solid #f0d8b8;border-radius:10px;font-size:1rem;outline:none;transition:border .2s}
.input-group input:focus{border-color:#c47c32}
.start-btn{width:100%;background:linear-gradient(135deg,#7b3f00,#c47c32);color:white;border:none;padding:14px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:8px}
.start-btn:hover{opacity:.9}
#app-screen{display:none}
.app-header{background:linear-gradient(135deg,#7b3f00,#c47c32);color:white;text-align:center;padding:24px 20px 36px}
.couple-names{font-size:1rem;opacity:.9;margin-bottom:4px}
.app-header h1{font-size:1.8rem;font-weight:700}
.subtitle{font-size:.85rem;opacity:.8;margin-top:4px}
.progress-section{background:white;margin:-18px 16px 16px;border-radius:16px;padding:16px 18px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.progress-info{display:flex;justify-content:space-between;font-size:.82rem;color:#7b3f00;font-weight:600;margin-bottom:8px}
.progress-bar{background:#f0e0c8;border-radius:20px;height:12px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7b3f00,#c47c32);border-radius:20px;transition:width .5s ease;width:0%}
.notif-btn{display:block;width:calc(100% - 32px);margin:0 16px 16px;background:#fff3e0;border:2px dashed #c47c32;color:#7b3f00;padding:12px;border-radius:12px;font-size:.9rem;font-weight:600;cursor:pointer;text-align:center}
.today-section{padding:0 16px 10px}
.today-card{background:white;border-radius:20px;padding:22px;box-shadow:0 4px 20px rgba(123,63,0,.12);border-left:5px solid #c47c32}
.today-badge{display:inline-block;background:#fff3e0;color:#7b3f00;font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px;letter-spacing:1px}
.today-card h2{font-size:1.2rem;color:#7b3f00;margin-bottom:12px}
.verse-box{background:#fff8f0;border-left:3px solid #c47c32;padding:10px 14px;border-radius:0 10px 10px 0;font-style:italic;font-size:.88rem;color:#5a3a1a;margin-bottom:12px}
.reflection{font-size:.9rem;line-height:1.7;color:#4a3728;margin-bottom:14px}
.challenge-box,.prayer-box{border-radius:12px;padding:12px 14px;margin-bottom:10px}
.challenge-box{background:#fdf6ee;border:1px solid #f0d0a0}
.prayer-box{background:#f0f8f0;border:1px solid #d4e8d0}
.challenge-box h4{color:#7b3f00;font-size:.82rem;margin-bottom:5px}
.prayer-box h4{color:#2d6a35;font-size:.82rem;margin-bottom:5px}
.challenge-box p,.prayer-box p{font-size:.86rem;line-height:1.6;color:#4a3728}
.complete-btn{width:100%;background:linear-gradient(135deg,#7b3f00,#c47c32);color:white;border:none;padding:13px;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.complete-btn:hover{opacity:.9;transform:translateY(-1px)}
.complete-btn.done{background:linear-gradient(135deg,#2d6a35,#4caf50)}
.complete-btn:disabled{background:#a8d5a2;cursor:default;transform:none}
.days-grid-section{padding:10px 16px 30px}
.section-title{font-size:1rem;color:#7b3f00;margin-bottom:14px;font-weight:700}
.days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.day-cell{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s;border:2px solid transparent}
.day-cell.completed{background:linear-gradient(135deg,#2d6a35,#4caf50);color:white;box-shadow:0 3px 10px rgba(76,175,80,.3)}
.day-cell.today{background:linear-gradient(135deg,#7b3f00,#c47c32);color:white;box-shadow:0 3px 15px rgba(196,124,50,.5);animation:pulse 2s infinite}
.day-cell.locked{background:#f0e8de;color:#c0a888;cursor:default}
.day-cell.available{background:#fff3e0;color:#7b3f00;border-color:#c47c32}
.day-cell:not(.locked):hover{transform:scale(1.06)}
.day-cell .day-num{font-size:.95rem}
.day-cell .day-icon{font-size:.75rem;margin-top:2px}
@keyframes pulse{0%,100%{box-shadow:0 3px 10px rgba(196,124,50,.4)}50%{box-shadow:0 3px 20px rgba(196,124,50,.8)}}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:1000;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto}
.modal-overlay.active{display:flex}
.modal{background:white;border-radius:20px;padding:22px;max-width:460px;width:100%;margin:auto;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:#f0e8de;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;color:#7b3f00;font-weight:700}
.modal-badge{display:inline-block;background:#fff3e0;color:#7b3f00;font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px;letter-spacing:1px}
.modal h2{font-size:1.15rem;color:#7b3f00;margin-bottom:12px}
.all-done-banner{background:linear-gradient(135deg,#2d6a35,#4caf50);color:white;text-align:center;padding:24px;border-radius:16px;margin:0 16px 16px}
.all-done-banner h2{font-size:1.4rem;margin-bottom:8px}
.all-done-banner p{font-size:.9rem;opacity:.9;line-height:1.6}
.streak-badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:6px 16px;font-size:.85rem;font-weight:700;margin-top:12px}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-icon">☕</div>
  <h1>Cafe a Dois</h1>
  <p>40 Dias para um Amor que Transforma</p>
  <div class="login-card">
    <h3>Quem vai fazer o desafio?</h3>
    <div class="input-group"><label>Nome do Marido</label><input type="text" id="name1" placeholder="Ex: Carlos" maxlength="20"></div>
    <div class="input-group"><label>Nome da Esposa</label><input type="text" id="name2" placeholder="Ex: Ana" maxlength="20"></div>
    <button class="start-btn" onclick="startChallenge()">Comecar o Desafio!</button>
  </div>
</div>
<div id="app-screen">
  <header class="app-header">
    <div class="couple-names" id="couple-names"></div>
    <h1>Cafe a Dois</h1>
    <p class="subtitle">40 Dias para um Amor que Transforma</p>
  </header>
  <div class="progress-section">
    <div class="progress-info"><span id="progress-text">0 de 40 dias concluidos</span><span id="progress-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <button class="notif-btn" id="notif-btn" onclick="requestNotif()">Ativar lembretes diarios</button>
  <div class="today-section" id="today-section">
    <div class="today-card" id="today-card">
      <div class="today-badge">DESAFIO DE HOJE</div>
      <h2 id="today-title"></h2>
      <div class="verse-box" id="today-verse"></div>
      <div class="reflection" id="today-reflection"></div>
      <div class="challenge-box"><h4>Desafio do Dia</h4><p id="today-challenge"></p></div>
      <div class="prayer-box"><h4>Oracao</h4><p id="today-prayer"></p></div>
      <button class="complete-btn" id="complete-btn" onclick="completeToday()">Marcar como Concluido</button>
    </div>
  </div>
  <div class="days-grid-section">
    <h3 class="section-title">Todos os 40 Dias</h3>
    <div class="days-grid" id="days-grid"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">X</button>
    <div class="modal-badge" id="modal-badge"></div>
    <h2 id="modal-title"></h2>
    <div class="verse-box" id="modal-verse"></div>
    <div class="reflection" id="modal-reflection"></div>
    <div class="challenge-box"><h4>Desafio do Dia</h4><p id="modal-challenge"></p></div>
    <div class="prayer-box"><h4>Oracao</h4><p id="modal-prayer"></p></div>
    <button class="complete-btn" id="modal-complete-btn"></button>
  </div>
</div>
<script>
const days=[{day:1,title:"O Amor e uma Decisao",verse:'"Nao amemos de palavra nem de lingua, mas em acoes e em verdade." - 1 Joao 3:18',reflection:"Muita gente espera sentir vontade de amar para depois agir. Mas o amor que dura nao espera a vontade chegar. Ele age primeiro, e o sentimento vem depois. Seu casamento nao vai crescer sozinho esperando que as coisas melhorem.",challenge:"Olhe nos olhos do seu conjuge e diga uma coisa especifica que voce admira nele(a). Algo real, que voce observou nos ultimos dias.",prayer:"Senhor, nos ajuda a escolher o amor todos os dias, mesmo quando e dificil. Que nossas acoes falem mais alto que nossas palavras. Amen."},
{day:2,title:"Presenca de Verdade",verse:'"Esteja pronto para ouvir, mas seja tardio para falar." - Tiago 1:19',reflection:"Estar no mesmo comodo nao e o mesmo que estar presente. Voce pode estar sentado ao lado do seu conjuge olhando para o celular e estar completamente ausente. Presenca de verdade e olho no olho, corpo virado, ouvido aberto.",challenge:"Por 15 minutos hoje, guardem os celulares, desliguem a TV e so conversem. Pode ser sobre qualquer coisa.",prayer:"Deus, nos ensina a estar verdadeiramente presentes um para o outro. Que nossa atencao seja um ato de amor. Amen."},
{day:3,title:"Palavras que Constroem",verse:'"Palavra dita a seu tempo, como e boa!" - Proverbios 15:23',reflection:"Palavras tem peso. Uma critica na pressa de uma manha ruim pode ficar na cabeca do seu conjuge o dia inteiro. Uma palavra de encorajamento dita na hora certa pode mudar o dia de alguem.",challenge:"Mande uma mensagem para seu conjuge durante o dia. Nao sobre tarefas - so para dizer que voce esta pensando nele(a) e que e grato(a).",prayer:"Senhor, guarda as nossas bocas. Que as nossas palavras sejam instrumento de cura e nao de ferida. Amen."},
{day:4,title:"O Perigo da Rotina",verse:'"Lembra-te de onde caiste, arrepende-te e volta as primeiras obras." - Apocalipse 2:5',reflection:"A rotina pode ser perigosa. Quando o casamento vira so logistica, ele perde a graca. A solucao nao e uma viagem cara. E reintroduzir pequenos momentos de conexao no dia a dia.",challenge:"Facam juntos algo simples que faziam no comeco do relacionamento - preparar um cafe juntos, ouvir uma musica especial, ou olhar fotos antigas.",prayer:"Senhor, nos ajuda a nao deixar o automatico engolir o nosso amor. Amen."},
{day:5,title:"Perdao: O Remedio Mais Dificil",verse:'"Sede bondosos e compassivos, perdoando-vos mutuamente." - Efesios 4:32',reflection:"Perdoar nao significa fingir que nao doeu. Significa decidir nao deixar a magoa ser maior que o amor. Perdoar e um ato de coragem, nao de fraqueza.",challenge:"Se ha algo guardado que ainda pesa, ore sozinho primeiro. Depois, no momento certo, diga ao seu conjuge: 'Eu te perdoo por [algo especifico], e quero seguir em frente com voce.'",prayer:"Pai, o perdao e dificil. Mas Tu nos perdoaste primeiro. Nos da a forca para soltar o que machucou e recomear. Amen."},
{day:6,title:"Aprender a Pedir Desculpas",verse:'"Confessai os vossos pecados uns aos outros." - Tiago 5:16',reflection:"Pedir desculpa de verdade: reconhecer o erro, assumir a responsabilidade e comprometer-se com mudanca. Sem 'mas', sem justificativas, sem transferir culpa.",challenge:"Pense em uma coisa que voce fez que sabe que magoou seu conjuge. Peca desculpa hoje, de forma simples e sincera.",prayer:"Deus, nos da humildade para reconhecer nossos erros sem orgulho. Amen."},
{day:7,title:"Descanso Juntos",verse:'"Assim Ele o da ao seu amado enquanto dorme." - Salmos 127:2',reflection:"Casais que nao descansam juntos tendem a viver em paralelo, cada um no seu cansaco, sem se encontrar de verdade. Descansar juntos e pausar intencionalmente, sem agenda.",challenge:"Organizem um momento hoje - pode ser uma hora apenas - onde nao ha tarefas. Sem compromisso, sem tela. So voces dois.",prayer:"Senhor, nos ensina a descansar sem culpa. Que o nosso descanso nos aproxime um do outro. Amen."},
{day:8,title:"Voce Me Ve?",verse:'"Encorajai-vos uns aos outros e edificai-vos uns aos outros." - 1 Tessalonicenses 5:11',reflection:"Uma das necessidades mais profundas do ser humano e ser visto. Seu conjuge precisa saber que voce o(a) nota, que percebe o esforco, que enxerga alem das falhas.",challenge:"Observe seu conjuge hoje com atencao. Note algo que ele(a) fez bem. E verbalize: 'Eu percebi que voce... e isso me faz admirar voce.'",prayer:"Pai, nos abre os olhos para enxergar o melhor um no outro. Amen."},
{day:9,title:"Financas e Casamento",verse:'"Onde esta o teu tesouro, ai estara tambem o teu coracao." - Mateus 6:21',reflection:"Dinheiro e uma das maiores fontes de conflito em casamentos - nao porque e mau, mas porque revela valores. Conversar sobre financas nao e briga. E alinhamento.",challenge:"Sentem juntos por 20 minutos: 'Qual e o nosso maior sonho financeiro como casal?' Sem cobranças - so conversa.",prayer:"Senhor, que possamos ser administradores fieis do que Tu nos deste. Amen."},
{day:10,title:"O Dom da Amizade",verse:'"Um amigo ama em todo tempo." - Proverbios 17:17',reflection:"Os casamentos mais solidos cultivaram uma amizade genuina. Casais que sao amigos se divertem juntos e se procuram nas situacoes dificeis. Voce e seu conjuge sao amigos de verdade?",challenge:"Facam algo que fariam com um bom amigo: contem uma piada interna, relembrem uma historia engracada, ou simplesmente riam juntos.",prayer:"Deus, obrigado por nos dar um ao outro como companheiros. Amen."},
{day:11,title:"Respeito em Publico e em Privado",verse:'"Honrai a todos." - 1 Pedro 2:17',reflection:"A forma como voce fala do seu conjuge quando ele(a) nao esta presente revela o nivel de respeito que voce tem. O respeito e defender e honrar o nome do seu conjuge onde quer que voce esteja.",challenge:"Se sentir vontade de reclamar do conjuge para outra pessoa, transforme isso em oracao. Hoje, diga algo positivo sobre ele(a) para alguem.",prayer:"Pai, que o nosso respeito um pelo outro nao dependa de como estamos nos sentindo. Amen."},
{day:12,title:"Intimidade Alem do Fisico",verse:'"E os dois serao uma so carne." - Genesis 2:24',reflection:"A intimidade conjugal vai alem do fisico. E saber os medos secretos do outro, compartilhar os sonhos. Quando a intimidade emocional esta bem, o resto do casamento flui melhor.",challenge:"Compartilhe algo com seu conjuge que voce raramente conta - um medo, um sonho, uma inseguranca. Depois, ouca o dele(a) com atencao e sem julgamento.",prayer:"Senhor, cria entre nos um espaco seguro onde possamos ser quem somos sem medo. Amen."},
{day:13,title:"Brigar Bem",verse:'"Irai-vos, e nao pequeis; nao se ponha o sol sobre a vossa ira." - Efesios 4:26',reflection:"Todo casal briga. O problema nao e o conflito em si - e a forma de resolver. Sem xingamentos, sem trazer o passado, sem gritar para ganhar. O objetivo nao e vencer a briga - e resolver o problema juntos.",challenge:"Conversem sobre as 'regras' de como querem lidar com conflitos. Cada um diz uma coisa que considera importante durante uma briga.",prayer:"Deus, nos da sabedoria para resolver conflitos com amor. Amen."},
{day:14,title:"Duas Semanas: Pausa para Celebrar",verse:'"Alegrai-vos sempre no Senhor." - Filipenses 4:4',reflection:"Voce chegou ate o Dia 14. Escolher o seu casamento todo dia, em meio a uma vida agitada, e um ato de amor. Celebracoes sao importantes - elas marcam o tempo e criam memorias.",challenge:"Celebrem as duas semanas juntos. Um jantar simples, uma sobremesa especial. O importante e pausar e dizer: 'Estamos fazendo isso juntos, e isso importa.'",prayer:"Pai, obrigado por estas duas semanas. Obrigado por um conjuge que escolhe esta jornada comigo. Amen."},
{day:15,title:"O Poder do Toque",verse:'"Que a sua mao esquerda esteja debaixo da minha cabeca, e a sua direita me abrace." - Cantares 2:6',reflection:"O toque fisico - um abraco, segurar a mao, um beijo sem razao especial - e uma linguagem poderosa. Nao espere um momento especial para tocar com afeto.",challenge:"Hoje, toque seu conjuge com intencao pelo menos tres vezes - um abraco longo, segurar a mao, ou um beijo na testa. So porque voce quis.",prayer:"Senhor, que o nosso toque seja sempre expressao de cuidado e afeto. Amen."},
{day:16,title:"Sonhos do Casal",verse:'"Onde nao ha visao, o povo perece." - Proverbios 29:18',reflection:"Casais que nao sonham juntos tendem a crescer em direcoes diferentes. Os sonhos compartilhados criam um proposito comum - algo que voces dois estao construindo.",challenge:"Cada um escreve em um papel tres sonhos para o casal nos proximos 5 anos. Troquem os papeis, leiam e conversem sobre os pontos em comum.",prayer:"Deus, nos da uma visao compartilhada para o nosso futuro. Amen."},
{day:17,title:"Servico como Amor",verse:'"Por humildade, considerando cada um os outros superiores a si mesmo." - Filipenses 2:3',reflection:"Jesus lavou os pes dos discipulos. O maior ato de amor muitas vezes se parece com servico. No casamento, servir ao outro e um ato espiritual.",challenge:"Faca hoje, sem ser pedido e sem esperar reconhecimento, algo que aliviaria o dia do seu conjuge.",prayer:"Pai, nos faz servos um do outro com alegria. Amen."},
{day:18,title:"Gratidao que Transforma",verse:'"Em tudo dai gracas." - 1 Tessalonicenses 5:18',reflection:"A mente humana nota mais facilmente o que falta do que o que existe. A gratidao intencional reverte esse vies. Treine o olhar para perceber o bem.",challenge:"Escrevam juntos uma lista de 10 coisas que agradecem um no outro. Leiam as listas um para o outro em voz alta.",prayer:"Senhor, nos abre os olhos para ver as bencaos. Que a gratidao seja o tom do nosso lar. Amen."},
{day:19,title:"Ciume e Seguranca",verse:'"O amor se alegra com a verdade." - 1 Corintios 13:6',reflection:"O ciume excessivo vem do medo, nao do amor. A seguranca em um relacionamento se constroi com transparencia, confianca e comunicacao. Nao com controle.",challenge:"Tenham uma conversa honesta: 'O que eu posso fazer para que voce se sinta mais seguro(a) em nosso relacionamento?' Oucam sem se defender.",prayer:"Deus, que o nosso amor construa seguranca, nao prisoes. Amen."},
{day:20,title:"Metade do Caminho",verse:'"Melhor e serem dois do que um." - Eclesiastes 4:9',reflection:"Vinte dias. Metade da jornada. As vezes o casamento parece pesado porque carregamos coisas que nao nos pertencem. Hora de largar o peso desnecessario.",challenge:"Cada um compartilha algo que tem carregado sozinho. O outro ouve sem dar conselho - so acolhe.",prayer:"Pai, obrigado por este parceiro de jornada. Nos ajuda a carregar os pesos juntos. Amen."},
{day:21,title:"A Linguagem do Amor",verse:'"Nao busques o teu proprio bem, mas o bem alheio." - 1 Corintios 10:24',reflection:"Tendemos a amar os outros da forma que queremos ser amados. Aprender a linguagem do seu conjuge e um dos maiores atos de amor que voce pode fazer.",challenge:"Pergunte: 'Como voce mais se sente amado(a)? O que eu faco que te faz sentir valorizado(a)?' Ouca com cuidado.",prayer:"Senhor, nos ensina a amar da forma que o outro precisa receber. Amen."},
{day:22,title:"Fe Compartilhada",verse:'"Onde dois ou tres estao reunidos em meu nome, ali estou." - Mateus 18:20',reflection:"Casal que ora junto, permanece junto. A fe compartilhada cria uma ancora que segura o casamento em tempestades. Nao precisa ser complexo.",challenge:"Criem um ritual espiritual juntos - algo simples que possam fazer regularmente. Facam pela primeira vez hoje.",prayer:"Pai, que a nossa fe seja o centro do nosso lar. Amen."},
{day:23,title:"Lidar com o Passado",verse:'"Eis que faco coisa nova." - Isaias 43:19',reflection:"O passado pode ser um professor valioso ou uma prisao cruel. Trazer erros passados repetidamente para conflitos presentes e uma forma de nunca realmente perdoar.",challenge:"Identifique algo do passado que voce ainda traz para as brigas atuais. Ore sobre isso e decida, conscientemente, deixar esse ponto de lado.",prayer:"Senhor, nos liberta do passado. Que possamos enxergar o casamento com olhos novos. Amen."},
{day:24,title:"Cuidar de Si para Cuidar do Outro",verse:'"Nao sabeis que o vosso corpo e o templo do Espirito Santo?" - 1 Corintios 6:19',reflection:"Voce nao consegue dar o que nao tem. Um conjuge esgotado tem muito menos a oferecer ao relacionamento. Cuidar de voce mesmo nao e egoismo.",challenge:"Cada um diz ao outro uma coisa que o ajudaria a se sentir melhor consigo mesmo. Comprometam-se a apoiar.",prayer:"Pai, que possamos nos cuidar para cuidar melhor um do outro. Amen."},
{day:25,title:"Honrar os Limites",verse:'"O que Deus ajuntou nao o separe o homem." - Mateus 19:6',reflection:"Todo casamento precisa de limites saudaveis com trabalho, amigos, familia, redes sociais. Saber dizer nao para outras coisas e saber dizer sim para o casamento.",challenge:"'Existe algo em nossa rotina que esta roubando tempo e energia do nosso casamento?' Identifiquem um limite que precisam estabelecer juntos.",prayer:"Senhor, nos da sabedoria para proteger o que construimos. Amen."},
{day:26,title:"A Arte de Ceder",verse:'"Sede submissos uns aos outros no temor de Cristo." - Efesios 5:21',reflection:"Ceder nao e fraqueza. Em um casamento saudavel, ambos cedem. O casamento funciona no modelo de dois que se submetem mutuamente, em amor.",challenge:"Hoje, em alguma situacao pequena, ceda ao desejo do seu conjuge sem reclamar e com alegria genuina.",prayer:"Deus, nos ensina a ceder com graca e nao com amargura. Amen."},
{day:27,title:"Quando Um Esta Mais Fraco",verse:'"Se um cair, o companheiro levantara o seu amigo." - Eclesiastes 4:10',reflection:"Havera epocas em que um de voces estara mais forte e o outro mais fraco. O casamento e o lugar onde a fraqueza nao precisa se esconder.",challenge:"Pergunte: 'Como voce esta de verdade? Nao a resposta de costume.' E ouca com paciencia.",prayer:"Pai, que sejamos suporte um para o outro nas estacoes dificeis. Amen."},
{day:28,title:"Deixar as Familias no Lugar Certo",verse:'"Por isso, deixara o homem pai e mae e se unira a sua mulher." - Genesis 2:24',reflection:"'Deixar pai e mae' nao significa abandona-los; significa que o conjuge agora ocupa o primeiro lugar. A lealdade primaria e com quem voce se casou.",challenge:"'Existe alguma influencia familiar que tem criado atrito em nosso casamento? Como podemos lidar com isso juntos?' Conversem com honestidade.",prayer:"Senhor, que honremos nossas familias sem deixa-las ocupar o lugar do conjuge. Amen."},
{day:29,title:"Surpresa e Espontaneidade",verse:'"O coracao alegre faz bem como uma medicina." - Proverbios 17:22',reflection:"Casamentos que perderam a espontaneidade ficam pesados. Uma surpresa simples pode reacender algo que parecia apagado. O amor serio nao precisa ser sombrio.",challenge:"Surpreenda seu conjuge hoje com algo inesperado - um bilhetinho, o prato favorito sem ocasiao, ou uma piada interna.",prayer:"Deus, que a alegria habite o nosso lar. Amen."},
{day:30,title:"Transparencia sem Crueldade",verse:'"Falando a verdade em amor, crescamos naquele que e a cabeca, Cristo." - Efesios 4:15',reflection:"Verdade e amor precisam caminhar juntos. Dizer a verdade sem amor e crueldade disfarcada de honestidade.",challenge:"Diga ao seu conjuge algo verdadeiro e importante que voce tem evitado falar - mas diga com cuidado, escolhendo bem as palavras.",prayer:"Pai, que a verdade no nosso casamento sempre venha embalada em amor. Amen."},
{day:31,title:"O Casamento como Testemunho",verse:'"Assim brilhe a luz de voces diante dos homens." - Mateus 5:16',reflection:"Seu casamento fala. Um casamento que demonstra respeito, amor e alegria genuina e um testemunho poderoso no mundo de hoje.",challenge:"Qual casal ou pessoa jovem ao redor de voces poderia se beneficiar de um encorajamento? Facam algo concreto hoje.",prayer:"Senhor, que o nosso casamento seja uma bencao para todos ao nosso redor. Amen."},
{day:32,title:"Quando Deus Parece Distante",verse:'"Nunca te deixarei, nem te abandonarei." - Hebreus 13:5',reflection:"Ha epocas em que as oracoes parecem nao subir. Nesses momentos, a fidelidade importa mais do que o sentimento. Continue orando, mesmo sem emocao.",challenge:"Compartilhem como esta a vida espiritual de cada um hoje - sem julgamento. Orem juntos assim mesmo.",prayer:"Pai, mesmo quando nao Te sentimos perto, escolhemos confiar em Ti. Amen."},
{day:33,title:"Paciencia como Pratica",verse:'"O amor e paciente." - 1 Corintios 13:4',reflection:"A paciencia nao e passividade. E escolher nao reagir impulsivamente. Voce convive com alguem todos os dias - toda falha fica exposta.",challenge:"Hoje, quando sentir impaciencia com seu conjuge, respire fundo antes de reagir. Pergunte: 'Isso vai importar daqui a um ano?'",prayer:"Deus, nos da paciencia uns com os outros. Amen."},
{day:34,title:"Cumplicidade",verse:'"Dois sao melhor do que um." - Eclesiastes 4:9',reflection:"Cumplicidade e aquele olhar trocado num jantar que so voces dois entendem. Casais cumplices constroem uma linguagem propria.",challenge:"Criem ou relembrem algo que e so de voces - um apelido, um gesto, uma piada interna. Celebrem essa linguagem particular.",prayer:"Senhor, obrigado pela cumplicidade que construimos. Que continuemos nos escolhendo a cada dia. Amen."},
{day:35,title:"Generosidade no Casamento",verse:'"Dai, e ser-vos-a dado." - Lucas 6:38',reflection:"Um casamento generoso e aquele onde ninguem fica contando pontos. O amor nao funciona no sistema de troca.",challenge:"Hoje, faca tres coisas pequenas pelo seu conjuge sem esperar nada em troca e sem mencionar que fez.",prayer:"Pai, que possamos ser generosos um com o outro como Tu es generoso conosco. Amen."},
{day:36,title:"Renovar os Votos Todo Dia",verse:'"O amor nunca falha." - 1 Corintios 13:8',reflection:"Os votos do casamento foram feitos para serem renovados silenciosamente todos os dias. Cada dia que voces se escolhem e uma renovacao de votos.",challenge:"Escrevam os 'votos do dia' - nao os formais, mas o que querem prometer um ao outro para hoje. Leiam um para o outro.",prayer:"Senhor, que renovemos nosso compromisso a cada amanecer. Amen."},
{day:37,title:"O Legado que Voces Constroem",verse:'"Os filhos dos teus filhos sao a coroa dos velhos." - Proverbios 17:6',reflection:"Seu casamento nao e so sobre voces dois. E sobre o legado que estao deixando. Um casamento que persevera planta sementes que outros vao colher por geracoes.",challenge:"Conversem: que tipo de legado querem deixar? Como querem ser lembrados como casal?",prayer:"Pai, que o nosso casamento seja um presente para todos que virao depois. Amen."},
{day:38,title:"Nas Tempestades",verse:'"Tende bom animo, eu venci o mundo." - Joao 16:33',reflection:"Nenhum casamento fica imune as tempestades. O que importa nao e a ausencia de tempestades - e o que voces fazem quando elas chegam.",challenge:"Conversem sobre uma tempestade que ja enfrentaram juntos e superaram. O que aprenderam sobre como enfrentar dificuldades juntos?",prayer:"Senhor, quando as tempestades vierem, que nos encontrem de maos dadas. Amen."},
{day:39,title:"Amor que Envelhece Bem",verse:'"Quem encontrou uma boa esposa encontrou algo precioso." - Proverbios 18:22',reflection:"O amor que envelhece bem e obra-prima. E o casal de 70 anos que ainda ri junto. Esse amor nao cai do ceu - e cultivado. Dia apos dia, escolha apos escolha.",challenge:"Imaginem-se daqui a 30 ou 40 anos. Como querem estar? O que querem que ainda esteja vivo no relacionamento? Compartilhem essa visao hoje.",prayer:"Pai, que o nosso amor enveleca bem. Que o passar do tempo nos aproxime. Amen."},
{day:40,title:"O Comeco de Tudo",verse:'"Eu vim para que tenham vida e a tenham em abundancia." - Joao 10:10',reflection:"Parabens! Voces chegaram ao Dia 40 - juntos. Mas o Dia 40 nao e o fim - e o comeco. Cada habito cultivado aqui plantou uma semente. E sementes crescem. O melhor do casamento de voces ainda esta por vir.",challenge:"Celebrem como merecem. Jantem juntos, brindem a jornada, e cada um diz ao outro: 'Eu te escolho. Hoje e sempre.'",prayer:"Senhor, obrigado por estes 40 dias. Obrigado pelo conjuge ao nosso lado. Que tudo o que vivemos aqui continue vivo. Agora e para sempre. Amen."}];
let completed=JSON.parse(localStorage.getItem('cad_completed')||'[]');
let startDate=localStorage.getItem('cad_start');
let name1=localStorage.getItem('cad_name1')||'';
let name2=localStorage.getItem('cad_name2')||'';

function startChallenge(){
  const n1=document.getElementById('name1').value.trim();
  const n2=document.getElementById('name2').value.trim();
  if(!n1||!n2){alert('Por favor, preencha os dois nomes!');return;}
  name1=n1;name2=n2;
  localStorage.setItem('cad_name1',name1);
  localStorage.setItem('cad_name2',name2);
  if(!startDate){startDate=new Date().toISOString().split('T')[0];localStorage.setItem('cad_start',startDate);}
  showApp();
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('couple-names').textContent=name1+' e '+name2;
  renderAll();
}

function getTodayIndex(){
  const start=new Date(startDate);const now=new Date();
  const diff=Math.floor((now-start)/(1000*60*60*24));
  return Math.min(diff,39);
}

function getDayStatus(i){
  if(completed.includes(i))return'completed';
  if(i===getTodayIndex())return'today';
  if(i<getTodayIndex())return'available';
  return'locked';
}

function renderGrid(){
  const grid=document.getElementById('days-grid');grid.innerHTML='';
  days.forEach((d,i)=>{
    const s=getDayStatus(i);
    const cell=document.createElement('div');
    cell.className='day-cell '+s;
    const icon=s==='completed'?'V':s==='today'?'C':s==='locked'?'L':'';
    cell.innerHTML='<span class="day-num">'+d.day+'</span><span class="day-icon">'+icon+'</span>';
    if(s!=='locked')cell.onclick=()=>openModal(i);
    grid.appendChild(cell);
  });
}

function renderToday(){
  const idx=getTodayIndex();const d=days[idx];const s=getDayStatus(idx);
  document.getElementById('today-title').textContent='Dia '+d.day+' - '+d.title;
  document.getElementById('today-verse').textContent=d.verse;
  document.getElementById('today-reflection').textContent=d.reflection;
  document.getElementById('today-challenge').textContent=d.challenge;
  document.getElementById('today-prayer').textContent=d.prayer;
  const btn=document.getElementById('complete-btn');
  if(s==='completed'){btn.textContent='Dia Concluido!';btn.classList.add('done');btn.disabled=true;}
  else{btn.textContent='Marcar como Concluido';btn.disabled=false;btn.classList.remove('done');}
}

function renderProgress(){
  const pct=Math.round((completed.length/40)*100);
  document.getElementById('progress-text').textContent=completed.length+' de 40 dias concluidos';
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
}

function renderAll(){renderProgress();renderToday();renderGrid();}

function completeToday(){
  const idx=getTodayIndex();
  if(!completed.includes(idx)){completed.push(idx);localStorage.setItem('cad_completed',JSON.stringify(completed));}
  renderAll();if(completed.length===40)showAllDone();
}

function showAllDone(){
  document.getElementById('today-section').innerHTML='<div class="all-done-banner"><h2>Parabens! Voces completaram os 40 dias!</h2><p>O amor que voces cultivaram aqui vai durar para sempre. Continuem se escolhendo todos os dias.</p><div class="streak-badge">40 dias de amor em acao!</div></div>';
}

function openModal(idx){
  const d=days[idx];const s=getDayStatus(idx);
  document.getElementById('modal-badge').textContent='DIA '+d.day;
  document.getElementById('modal-title').textContent=d.title;
  document.getElementById('modal-verse').textContent=d.verse;
  document.getElementById('modal-reflection').textContent=d.reflection;
  document.getElementById('modal-challenge').textContent=d.challenge;
  document.getElementById('modal-prayer').textContent=d.prayer;
  const btn=document.getElementById('modal-complete-btn');
  if(s==='completed'){btn.textContent='Dia Concluido!';btn.classList.add('done');btn.disabled=true;btn.onclick=null;}
  else{btn.textContent='Marcar como Concluido';btn.classList.remove('done');btn.disabled=false;btn.onclick=()=>{completeDay(idx);closeModal();};}
  document.getElementById('modal-overlay').classList.add('active');
}

function completeDay(idx){
  if(!completed.includes(idx)){completed.push(idx);localStorage.setItem('cad_completed',JSON.stringify(completed));}
  renderAll();if(completed.length===40)showAllDone();
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('active');}

function requestNotif(){
  if(!('Notification' in window)){alert('Seu navegador nao suporta notificacoes.');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){
      localStorage.setItem('cad_notif','true');
      document.getElementById('notif-btn').textContent='Lembretes ativados!';
      document.getElementById('notif-btn').style.background='#e8f5e9';
      document.getElementById('notif-btn').style.borderColor='#4caf50';
      document.getElementById('notif-btn').style.color='#2d6a35';
      if('serviceWorker' in navigator){
        navigator.serviceWorker.register('sw.js').then(reg=>{
          console.log('SW registrado');
        }).catch(e=>console.log('SW erro:',e));
      }
    }
  });
}

// Init
window.addEventListener('load',()=>{
  if('serviceWorker' in navigator && localStorage.getItem('cad_notif')==='true'){
    navigator.serviceWorker.register('sw.js');
  }
  if(name1 && name2 && startDate){
    showApp();
  } else if(name1 && name2){
    document.getElementById('name1').value=name1;
    document.getElementById('name2').value=name2;
  }
  if(localStorage.getItem('cad_notif')==='true'){
    const btn=document.getElementById('notif-btn');
    if(btn){btn.textContent='Lembretes ativados!';btn.style.background='#e8f5e9';btn.style.borderColor='#4caf50';btn.style.color='#2d6a35';}
  }
});
</script>
</body>
</html>
